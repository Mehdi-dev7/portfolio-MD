<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Nouveau message — Portfolio</title>
  <!--
    EMAILJS — Comment l’utiliser
    1) Dashboard → Email Templates → ouvrir ton modèle (ou en créer un).
    2) Passer en édition HTML / « Edit Content » → coller TOUT le fichier (de <!DOCTYPE> à </html>),
       ou seulement le contenu entre <body> et </body> si l’éditeur l’exige.
    3) « To Email » : ton adresse de réception (fixe dans les paramètres du service ou du template).
    4) Variables exactes : {{name}}  {{email}}  {{message}} (déjà utilisées ci-dessous).
    Polices : pas d’Inter en e-mail fiable → Segoe UI / Roboto / Arial en secours.
  -->
</head>
<body style="margin:0;padding:0;background-color:#0f1418;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#0f1418;background:linear-gradient(180deg,#141a20 0%,#0f1418 40%,#0f1418 100%);">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:560px;margin:0 auto;">
          <!-- Barre accent -->
          <tr>
            <td style="height:4px;background:linear-gradient(90deg,#20b2a6 0%,#1a8f86 50%,#f5a623 100%);border-radius:4px 4px 0 0;"></td>
          </tr>
          <!-- Carte principale -->
          <tr>
            <td style="background-color:#1a2329;border:1px solid #242b32;border-top:none;border-radius:0 0 16px 16px;padding:0;overflow:hidden;">
              <!-- En-tête -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="padding:28px 28px 20px 28px;">
                    <p style="margin:0 0 6px 0;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#20b2a6;">
                      Portfolio — Contact
                    </p>
                    <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:400;font-style:italic;line-height:1.3;color:#f0f2f5;">
                      Nouveau message reçu
                    </h1>
                    <p style="margin:12px 0 0 0;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:14px;line-height:1.6;color:#7a8491;">
                      Quelqu’un vient d’envoyer un message via le formulaire de ton site.
                    </p>
                  </td>
                </tr>
              </table>
              <!-- Bloc expéditeur -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="padding:0 28px 20px 28px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#141a1f;border:1px solid #2a3238;border-radius:12px;">
                      <tr>
                        <td style="padding:18px 20px;">
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                              <td style="padding-bottom:14px;border-bottom:1px solid #242b32;">
                                <p style="margin:0 0 4px 0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7a8491;">Nom</p>
                                <p style="margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:16px;font-weight:600;color:#f0f2f5;">{{name}}</p>
                              </td>
                            </tr>
                            <tr>
                              <td style="padding-top:14px;">
                                <p style="margin:0 0 4px 0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7a8491;">E-mail</p>
                                <p style="margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:15px;">
                                  <a href="mailto:{{email}}" style="color:#20b2a6;text-decoration:none;font-weight:500;">{{email}}</a>
                                </p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
              <!-- Message -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="padding:0 28px 28px 28px;">
                    <p style="margin:0 0 10px 0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7a8491;">Message</p>
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#0f1418;border-left:3px solid #20b2a6;border-radius:0 10px 10px 0;">
                      <tr>
                        <td style="padding:18px 20px;">
                          <p style="margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:15px;line-height:1.65;color:#f0f2f5;white-space:pre-wrap;">{{message}}</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
              <!-- Pied -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#141a1f;border-top:1px solid #242b32;">
                <tr>
                  <td style="padding:16px 28px 22px 28px;text-align:center;">
                    <p style="margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:12px;line-height:1.5;color:#7a8491;">
                      Réponse rapide suggérée : <a href="mailto:{{email}}" style="color:#20b2a6;text-decoration:none;">répondre à {{email}}</a>
                    </p>
                    <p style="margin:10px 0 0 0;font-family:'Segoe UI',Roboto,Arial,sans-serif;font-size:11px;color:#5c6570;">
                      Thème aligné sur ton portfolio · teal <span style="color:#20b2a6;">■</span> · fond sombre
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
